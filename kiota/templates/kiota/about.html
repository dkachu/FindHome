{% extends 'kiota/base.html' %}

{% block content %}

<div class="isolate relative z-0"> 
    <div class="max-w-6xl mx-auto py-24 px-4 min-h-[70vh] flex items-center">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            
           
            <div class="relative">
              
                <div class="overflow-hidden">
                    <div class="animate-in slide-in-from-left duration-500 fill-mode-forwards">
                        <h1 class="text-6xl font-black mb-8 tracking-tighter text-gray-900 leading-tight">
                            Welcome to <br>
                            <span class="text-[#FF385C]">
                                {{ company.name|default:"KIOTA" }}
                            </span>
                        </h1>
                        
                        <div class="text-lg leading-relaxed text-gray-600 space-y-6">
                            {{ company.about_description|linebreaks }}
                        </div>
                    </div>
                </div>
                
                <div class="mt-10 flex flex-wrap gap-4">
                    <a href="{% url 'index' %}" class="btn btn-primary px-8 rounded-xl font-bold uppercase tracking-tight">Browse Properties</a>
                    <a href="{% url 'contact' %}" class="btn btn-primary px-8 rounded-xl font-bold uppercase tracking-tight">Get in Touch</a>
                </div>
            </div>

            
            <div class="relative group">
                <div class="animate-in zoom-in duration-500">
                    <div class="absolute -inset-4 bg-gray-100 rounded-[3rem] opacity-50 z-[-1]"></div>
                    
                    <div class="relative rounded-[2.5rem] overflow-hidden shadow-xl bg-white p-2 border border-gray-100">
                        {% if company.logo %}
                            <img src="{{ company.logo.url }}" class="w-full h-auto object-cover rounded-[2.2rem]" alt="Kiota Branding" />
                        {% else %}
                            <div class="w-full h-96 bg-gray-50 flex items-center justify-center rounded-[2.2rem] border border-dashed border-gray-200">
                                 <span class="text-[#FF385C] font-black text-4xl italic tracking-tighter">{{ company.name|default:"KIOTA" }}</span>
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
